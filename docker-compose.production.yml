services:
  blog:
    image: ghcr.io/while-maybe/blogengine:latest
    container_name: blogengine
    restart: unless-stopped
    environment:
      - APP_NAME=${APP_NAME:-"give me a name :("}
      - APP_ENV=prod
      - APP_SOURCES_DIR=${APP_SOURCES_DIR:-./sources}
      - HTTP_PORT=${HTTP_PORT:-3000}
      - HTTP_READ_TIMEOUT=${HTTP_READ_TIMEOUT:-5s}
      - HTTP_WRITE_TIMEOUT=${HTTP_WRITE_TIMEOUT:-10s}
      - HTTP_IDLE_TIMEOUT=${HTTP_IDLE_TIMEOUT:-10m}
      - HTTP_SHUTDOWN_DELAY=${HTTP_SHUTDOWN_DELAY:-10s}
      - LIMITER_RPS=${LIMITER_RPS:-20}
      - LIMITER_BURST=${LIMITER_BURST:-50}
      - PROXY_TRUSTED=${PROXY_TRUSTED:-true}

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - blog

  updater:
    image: docker:cli
    container_name: gitops_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache git
        git config --global --add safe.directory /app
        
        echo "GitOps Updater starting..."
        
        while true; do
          echo "[$(date)] Checking for updates..."
          
          # Pull configuration changes from Git
          git fetch origin 2>&1
          LOCAL=$$(git rev-parse HEAD 2>/dev/null || echo "")
          REMOTE=$$(git rev-parse @{u} 2>/dev/null || echo "")
          
          if [ -n "$$LOCAL" ] && [ -n "$$REMOTE" ] && [ "$$LOCAL" != "$$REMOTE" ]; then
            echo "Configuration changes detected. Pulling..."
            git pull
          fi
          
          # Pull latest images (this checks GHCR for new versions)
          echo "Checking for new images..."
          docker compose -f docker-compose.production.yml pull --quiet blog tunnel
          
          # Only recreate if images actually changed - skip recreation if nothing changed
          docker compose -f docker-compose.production.yml up -d blog tunnel
          
          echo "[$(date)] Update complete. Next check in 5 minutes."
          sleep 300
        done
