services:
  blog:
    # Use the image built by GitHub Actions
    image: ghcr.io/while-maybe/blogengine:latest
    container_name: blogengine
    restart: unless-stopped
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=prod
      - APP_SOURCES_DIR=${APP_SOURCES_DIR}

      - HTTP_PORT=${HTTP_PORT}
      - HTTP_READ_TIMEOUT=${HTTP_READ_TIMEOUT}
      - HTTP_WRITE_TIMEOUT=${HTTP_WRITE_TIMEOUT}
      - HTTP_IDLE_TIMEOUT=${HTTP_IDLE_TIMEOUT}
      - HTTP_SHUTDOWN_DELAY=${HTTP_SHUTDOWN_DELAY}

      - LIMITER_RPS=${LIMITER_RPS}
      - LIMITER_BURST=${LIMITER_BURST}
      
      - PROXY_TRUSTED=${PROXY_TRUSTED}
    # No ports exposed (using Tunnel)

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - blog

  updater:
    image: docker:cli
    container_name: gitops_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache git
        git config --global --add safe.directory /app
        echo "Starting Unified Updater"
        
        while true; do
          echo "[$(date)] Checking for updates..."
          
          # 1. Update Code/Config from Git
          git fetch origin 2>/dev/null || echo "Git fetch failed, continuing..."
          LOCAL=$(git rev-parse HEAD 2>/dev/null || echo "")
          REMOTE=$(git rev-parse @{u} 2>/dev/null || echo "")
          
          if [ -n "$LOCAL" ] && [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ]; then
            echo "[$(date)] Git configuration change detected. Pulling..."
            git pull
          fi
          
          # 2. Update Infrastructure
          # Pull latest images and recreate containers if needed
          # --force-recreate: Always recreate containers (like Watchtower's behavior)
          # --quiet-pull: Don't spam logs
          # --pull always: Always check for new images (Watchtower behavior)
          # --remove-orphans: Clean up old containers
          
          docker compose -f docker-compose.production.yml pull --quiet 2>&1 | grep -v "Pulling" || true
          docker compose -f docker-compose.production.yml up -d --remove-orphans 2>&1 | \
            grep -v "Container.*Creating\|Container.*Starting\|Container.*Running" || true
          
          echo "[$(date)] Update check complete. Next check in 5 minutes."
          sleep 300
        done